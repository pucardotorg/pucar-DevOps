# Common Labels
labels:
  app: "njdg-transformer"
  group: "backend"

# Init Containers Configs
healthChecks:
  enabled: true
  livenessProbePath: "/njdg-transformer/health"
  readinessProbePath: "/njdg-transformer/health"

lokiEnabled: true
tracing-enabled: true

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: false
    schemaTable: "njdg-transformer_service_schema"
    image:
      repository: "docker.io/venkatramireddyb/njdg-transformer-db"
      tag: main-4a2f7932caa0c010485bfec26fc831e22dc38452

# Container Configs
image:
  repository: "docker.io/venkatramireddyb/njdg-transformer"
  tag: main-4a2f7932caa0c010485bfec26fc831e22dc38452
  imagePullPolicy: Always
replicas: "1"
httpPort: 8080
appType: "java-spring"
db: "njdg"
heap: "-Xmx64m -Xms64m"
java-args: "-Dspring.profiles.active=monitoring"
memory_requests: 256Mi
debugPort: 5005

env: |
  - name: SERVER_PORT
    value: "8080"
  - name: SERVER_CONTEXT_PATH
    value: /njdg-transformer
  - name: EGOV_FILESTORE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-filestore
  - name: DRISTI_ORDER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: order
  - name: EGOV_MDMS_HOST
    valueFrom:
      configMapKeyRef:
        key: egov-mdms-service
        name: egov-service-host
  - name: EGOV_HEARING_HOST
    valueFrom:
      configMapKeyRef:
        key: hearing
        name: egov-service-host
  - name: EGOV_CASE_HOST
    valueFrom:
      configMapKeyRef:
        key: case
        name: egov-service-host
  - name: EGOV_INDIVIDUAL_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key:  individual
