# Common Labels
labels:
  app: "egov-localization"
  group: "core"

# Ingress Configs
ingress:
  enabled: true
  zuul: true
  context: "localization"

lokiEnabled: true
tracing-enabled: true

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "egov_localization_schema"
    image:
      repository: "docker.io/venkatramireddyb/egov-localization-db"
      tag: core-2.9-lts-mvn-check-59c2e5ea5b-9

# Container Configs
image:
  repository: "docker.io/venkatramireddyb/egov-localization"
  tag: core-2.9-lts-mvn-check-59c2e5ea5b-9
replicas: "1"
appType: "java-spring"
heap: "-Xmx256m -Xms256m"
memory_limits: 512Mi
healthChecks:
  enabled: true
  livenessProbePath: "/localization/health"
  readinessProbePath: "/localization/health"
redisEnabled: true

# Additional Container Envs
env: |
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAEGER_SAMPLER_PARAM
    value: "1"
