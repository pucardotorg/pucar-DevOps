# Common Labels
labels:
  app: "template-configuration"
  group: "backend"

# Ingress Configs
ingress:
  zuul: true
  enabled: true
  context: "template-configuration"

lokiEnabled: true

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "template_configuration_service_schema"
    image:
      repository: "docker.io/venkatramireddyb/template-configuration-db"
      tag: main-eac2161dde59072e91b142be82e47dc9df110c4f

# Container Configs
image:
  repository: "docker.io/venkatramireddyb/template-configuration"
  tag: main-eac2161dde59072e91b142be82e47dc9df110c4f
  imagePullPolicy: Always
replicas: "1"
httpPort: 8080
appType: "java-spring"
heap: "-Xmx256m -Xms256m"
java-args: "-Dspring.profiles.active=monitoring"
memory_limits: 768Mi


healthChecks:
  enabled: true
  livenessProbePath: "/template-configuration/health"
  readinessProbePath: "/template-configuration/health"

env: |
  - name: MANAGEMENT_HEALTH_REDIS_ENABLED
    value: "false"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
