# Common Labels
labels:
  app: "ctc"
  group: "backend"

# Ingress Configs
ingress:
  zuul: true
  enabled: true
  context: "ctc"

lokiEnabled: true
tracing-enabled: true
redisEnabled: true

# Init Containers Configs
initContainers:
  dbMigration:
    enabled: true
    schemaTable: "ctc_service_schema"
    image:
      repository: "docker.io/venkatramireddyb/ctc-db"
      tag: v1.0.0-66cf9764c39721c25d36ee62799cec6953427d9e

# Container Configs
image:
  repository: "docker.io/venkatramireddyb/ctc"
  tag: v1.0.0-66cf9764c39721c25d36ee62799cec6953427d9e
  imagePullPolicy: Always
replicas: "1"
httpPort: 8080
appType: "java-spring"
heap: "-Xmx1536m -Xms1536m"
debugPort: 5005
java-args: "-Dspring.profiles.active=monitoring"
memory_requests: 2Gi
memory_limits: 2Gi

healthChecks:
  enabled: true
  livenessProbePath: "/ctc/health"
  readinessProbePath: "/ctc/health"

env: |
  - name: NOTIFICATION_SMS_ENABLED
    value: "false"
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: SERVER_PORT
    value: "8080"
  - name: JAVA_ARGS
    value: {{ index .Values "java-args" | quote }}
  - name: EGOV_LOCALIZATION_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-localization
  - name: EGOV_INDIVIDUAL_HOST
    valueFrom:
      configMapKeyRef:
        key: individual
        name: egov-service-host
  - name: EGOV_MDMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-mdms-service
  - name: EGOV_HRMS_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-hrms
  - name: EGOV_USER_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-user
  - name: EGOV_IDGEN_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-idgen
  - name: EGOV_FILESTORE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-filestore
  - name: EGOV_ADVOCATE_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: advocate
  - name: EGOV_CASE_HOST
    valueFrom:
      configMapKeyRef:
        key: case
        name: egov-service-host
  - name: EGOV_HEARING_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: hearing
  - name: EGOV_WORKFLOW_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: egov-workflow-v2
  - name: EGOV_URL_SHORTNER_HOST
    valueFrom:
      configMapKeyRef:
        key: egov-url-shortening
        name: egov-service-host
  - name: EGOV_ETREASURY_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: etreasury
  - name: EGOV_INFRA_INDEXER_HOST
    valueFrom:
      configMapKeyRef:
        key: es-indexer-host
        name: egov-config
  - name: EGOV_INDEXER_ES_USERNAME
    valueFrom:
      secretKeyRef:
        name: elasticsearch-credentials
        key: username
  - name: EGOV_INDEXER_ES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-credentials
        key: password
  - name: EGOV_ESIGN_HOST
    valueFrom:
      configMapKeyRef:
        name: egov-service-host
        key: e-sign-svc
  - name: EGOV_DRISTI_PDF_HOST
    valueFrom:
      configMapKeyRef:
        key: dristi-pdf
        name: egov-service-host

  - name: KAFKA_TOPICS_RECEIPT_CREATE
    value: egov.collection.payment-create



