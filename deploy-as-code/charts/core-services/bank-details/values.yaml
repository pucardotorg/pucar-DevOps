# Common Labels
labels:
  app: "bank-details"
  group: "dristi-services"

# Ingress Configs
ingress:
  zuul: true
  enabled: true
  context: "bank-details"

lokiEnabled: true

healthChecks:
  enabled: true
  livenessProbePath: "/bank-details/health"
  readinessProbePath: "/bank-details/health"

# Container Configs
image:
  repository: "docker.io/venkatramireddyb/bank-details"
  tag: develop-6416f71f46c8815c5d4cb36bed8273d9a1c17e1a
  imagePullPolicy: Always
replicas: "1"
httpPort: 8080
appType: "java-spring"
java-args: "-Dspring.profiles.active=monitoring"
heap: "-Xmx256m -Xms256m"
debugPort: 5005
memory_limits: 640Mi
env: |
  - name: JAVA_OPTS
    value: {{ index .Values "heap" | quote }}
  - name: JAVA_ARGS
    value: -Dspring.profiles.active=monitoring
  - name: SERVER_PORT
    value: "8080"
  - name: SERVER_CONTEXT_PATH
    value: /bank-details
